<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multimedia Web Design Project</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      --bg-1: #f3f4ff;
      --bg-2: #e9f7ff;
      --text-main: #1f2937;
      --text-soft: #4b5563;
      --card-border: rgba(255, 255, 255, 0.45);
      --shadow: 0 20px 45px rgba(35, 47, 62, 0.12);
      --brand: #2563eb;
      --brand-soft: rgba(37, 99, 235, 0.12);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.2), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(56, 189, 248, 0.2), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text-main);
      padding: 24px;
    }
    main {
      width: min(760px, 92vw);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 30px;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.45s ease-out;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.35rem, 2.6vw, 1.9rem);
      letter-spacing: 0.2px;
    }
    p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.5;
    }
    ul {
      list-style: none;
      margin: 20px 0 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      text-decoration: none;
      font-weight: 600;
      color: var(--brand);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 12px;
      padding: 12px 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    a:hover {
      transform: translateY(-1px);
      background: var(--brand-soft);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.15);
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Multimedia Web Design Project</h1>
    <p>Select a panel to continue:</p>
    <ul>
      <li><a href="./student/login.html">Student Login</a></li>
      <li><a href="./organizer/organizer-login.html">Organizer Login</a></li>
      <li><a href="./admin/login.html">Admin Login</a></li>
    </ul>
  </main>
</body>
</html>
