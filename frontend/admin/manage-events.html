<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBU Connect | Manage Events</title>
  <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="url(#sg)"/>
          <path d="M8 16l5 5 9-10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="sg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#4f7cf7"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <span class="logo-text">IBU Connect</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="admin-dashboard.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <span class="nav-section-label">Management</span>
      <a href="manage-users.html" class="nav-item" id="navUsers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Manage Users
      </a>
      <a href="manage-clubs.html" class="nav-item" id="navClubs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Manage Clubs
      </a>
      <a href="manage-events.html" class="nav-item" id="navEvents">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Manage Events
      </a>
      <a href="assign-roles.html" class="nav-item" id="navRoles">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Assign Roles
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">AD</div>
        <div>
          <div class="user-name" id="sidebarName">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-secondary btn-full" onclick="logout()" style="font-size:12px;padding:8px 12px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">Manage Events</div>
        <div class="topbar-subtitle">View and moderate all events in the system</div>
      </div>
      <div class="role-badge admin-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Administrator
      </div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="search-bar">
          <div class="search-input-wrap">
            <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted)" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="eventSearch" placeholder="Search events by title or category...">
          </div>
          <select id="statusFilter" style="background:var(--glass-bg);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr><th>#</th><th>Title</th><th>Category</th><th>Date</th><th>Location</th><th>Quota</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="eventsBody">
              <tr class="loading-row"><td colspan="8">Loading events...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div class="modal-overlay" id="delModal">
    <div class="modal-card" style="max-width:420px;">
      <div class="modal-title">Delete Event</div>
      <p id="delMsg" style="color:var(--text-secondary);font-size:14px;"></p>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="$('#delModal').removeClass('visible')">Cancel</button>
        <button class="btn-danger" id="delConfirmBtn">Delete Event</button>
      </div>
    </div>
  </div>


  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/common/api.js"></script>
  <script src="../assets/js/common/auth.js"></script>

  <script>
    let allEvents = [];

    $(document).ready(async function() {
      if (!guardAdmin()) return;
      setUserInfoSidebar();
      $('#navEvents').addClass('active');
      await loadEvents();
      $('#eventSearch').on('input', filterEvents);
      $('#statusFilter').on('change', filterEvents);
      $('#delModal').on('click', function(e) { if($(e.target).is('#delModal')) $('#delModal').removeClass('visible'); });
    });

    async function loadEvents() {
      try {
        const data = await API.getAdminEvents();
        allEvents = Array.isArray(data) ? data : (data.events || []);
        renderEvents(allEvents);
      } catch(e) {
        $('#eventsBody').html('<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted);">Could not load events.</td></tr>');
      }
    }

    function renderEvents(events) {
      if (!events.length) {
        $('#eventsBody').html('<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted);">No events found.</td></tr>');
        return;
      }
      $('#eventsBody').html(events.map((ev, i) => {
        const date = ev.event_date ? new Date(ev.event_date).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '—';
        const stCls = ev.status === 'active' ? 'badge-green' : ev.status === 'cancelled' ? 'badge-red' : 'badge-yellow';
        return '<tr>' +
          '<td style="color:var(--text-muted)">' + (i+1) + '</td>' +
          '<td style="color:var(--text-primary);font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (ev.title||'—') + '</td>' +
          '<td><span class="badge badge-blue" style="font-size:10px;">' + (ev.category||'—') + '</span></td>' +
          '<td>' + date + '</td>' +
          '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (ev.location||'—') + '</td>' +
          '<td>' + (ev.quota||0) + '</td>' +
          '<td><span class="badge ' + stCls + '">' + (ev.status||'—') + '</span></td>' +
          '<td><button class="btn-danger" onclick="confirmDel(' + ev.id + ','' + (ev.title||'').replace(/'/g,"\'") + '')">Delete</button></td>' +
        '</tr>';
      }).join(''));
    }

    function filterEvents() {
      const q = $('#eventSearch').val().toLowerCase();
      const st = $('#statusFilter').val();
      renderEvents(allEvents.filter(ev => {
        const mQ = !q || (ev.title||'').toLowerCase().includes(q) || (ev.category||'').toLowerCase().includes(q);
        const mS = !st || ev.status === st;
        return mQ && mS;
      }));
    }

    function confirmDel(id, title) {
      $('#delMsg').text('Delete event "' + title + '"? This cannot be undone.');
      $('#delConfirmBtn').off('click').on('click', async function() {
        try { await API.deleteEvent(id); $('#delModal').removeClass('visible'); await loadEvents(); }
        catch(e) { alert('Error: ' + e.message); }
      });
      $('#delModal').addClass('visible');
    }
  </script>
</body>
</html>
