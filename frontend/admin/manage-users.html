<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBU Connect | Manage Users</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
    .dot-active { background:#10b981; }
    .dot-inactive { background:#ef4444; }
    .action-btns { display:flex; gap:6px; flex-wrap:wrap; }
    select.role-select { background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); border-radius:6px; padding:4px 8px; font-size:12px; font-family:inherit; cursor:pointer; outline:none; }
    select.role-select:focus { border-color:var(--accent); }
  </style>
</head>
<body class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="url(#sg)"/>
          <path d="M8 16l5 5 9-10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="sg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#4f7cf7"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <span class="logo-text">IBU Connect</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="admin-dashboard.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <span class="nav-section-label">Management</span>
      <a href="manage-users.html" class="nav-item" id="navUsers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Manage Users
      </a>
      <a href="manage-clubs.html" class="nav-item" id="navClubs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Manage Clubs
      </a>
      <a href="manage-events.html" class="nav-item" id="navEvents">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Manage Events
      </a>
      <a href="assign-roles.html" class="nav-item" id="navRoles">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Assign Roles
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">AD</div>
        <div>
          <div class="user-name" id="sidebarName">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-secondary btn-full" onclick="logout()" style="font-size:12px;padding:8px 12px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">Manage Users</div>
        <div class="topbar-subtitle">View, update roles and status of all users</div>
      </div>
      <div class="role-badge admin-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Administrator
      </div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="search-bar">
          <div class="search-input-wrap">
            <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted)" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="userSearch" placeholder="Search by name or email...">
          </div>
          <select id="roleFilter" style="background:var(--glass-bg);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;">
            <option value="">All Roles</option>
            <option value="student">Student</option>
            <option value="organizer">Organizer</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr><th>#</th><th>Full Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
            </thead>
            <tbody id="usersBody">
              <tr class="loading-row"><td colspan="7">Loading users...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-card">
      <div class="modal-title" id="confirmTitle">Confirm Action</div>
      <p id="confirmMsg" style="color:var(--text-secondary);font-size:14px;"></p>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-danger" id="confirmBtn">Confirm</button>
      </div>
    </div>
  </div>


  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/common/api.js"></script>
  <script src="../assets/js/common/auth.js"></script>

  <script>
    let allUsers = [];
    let pendingAction = null;

    $(document).ready(async function () {
      if (!guardAdmin()) return;
      setUserInfoSidebar();
      $('#navUsers').addClass('active');
      await loadUsers();

      $('#userSearch').on('input', filterUsers);
      $('#roleFilter').on('change', filterUsers);
    });

    async function loadUsers() {
      try {
        const data = await API.getUsers();
        allUsers = Array.isArray(data) ? data : (data.users || []);
        renderUsers(allUsers);
      } catch(e) {
        $('#usersBody').html('<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">Could not load users. Is the backend running?</td></tr>');
      }
    }

    function renderUsers(users) {
      if (!users.length) {
        $('#usersBody').html('<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">No users found.</td></tr>');
        return;
      }
      $('#usersBody').html(users.map((u, i) => {
        const roleCls = u.role === 'admin' ? 'badge-red' : u.role === 'organizer' ? 'badge-yellow' : 'badge-blue';
        const date = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '—';
        const statusHtml = u.is_active
          ? '<span class="status-dot dot-active"></span>Active'
          : '<span class="status-dot dot-inactive"></span>Inactive';
        const toggleLabel = u.is_active ? 'Deactivate' : 'Activate';
        const toggleCls = u.is_active ? 'btn-danger' : 'btn-success';
        return '<tr>' +
          '<td style="color:var(--text-muted)">' + (i+1) + '</td>' +
          '<td style="color:var(--text-primary);font-weight:500;">' + (u.full_name || '—') + '</td>' +
          '<td>' + (u.email || '—') + '</td>' +
          '<td><span class="badge ' + roleCls + '">' + (u.role || '—') + '</span></td>' +
          '<td style="font-size:13px;">' + statusHtml + '</td>' +
          '<td>' + date + '</td>' +
          '<td><div class="action-btns">' +
            '<button class="' + toggleCls + '" onclick="confirmToggleStatus(' + u.id + ',' + u.is_active + ','' + (u.full_name||'') + '')">' + toggleLabel + '</button>' +
          '</div></td>' +
        '</tr>';
      }).join(''));
    }

    function filterUsers() {
      const q = $('#userSearch').val().toLowerCase();
      const role = $('#roleFilter').val();
      const filtered = allUsers.filter(u => {
        const matchQ = !q || (u.full_name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
        const matchRole = !role || u.role === role;
        return matchQ && matchRole;
      });
      renderUsers(filtered);
    }

    function confirmToggleStatus(id, isActive, name) {
      const action = isActive ? 'deactivate' : 'activate';
      $('#confirmTitle').text('Confirm Status Change');
      $('#confirmMsg').text('Are you sure you want to ' + action + ' user "' + name + '"?');
      pendingAction = async () => {
        try {
          await API.updateUserStatus(id, !isActive);
          closeModal();
          await loadUsers();
        } catch(e) { alert('Error: ' + e.message); }
      };
      $('#confirmBtn').off('click').on('click', pendingAction);
      $('#confirmModal').addClass('visible');
    }

    function closeModal() { $('#confirmModal').removeClass('visible'); }
    $('#confirmModal').on('click', function(e) { if ($(e.target).is('#confirmModal')) closeModal(); });
  </script>
</body>
</html>
