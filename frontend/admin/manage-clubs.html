<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBU Connect | Manage Clubs</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    .clubs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .club-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; transition:var(--transition); animation:fadeIn 0.4s ease both; }
    .club-card:hover { border-color:rgba(79,124,247,0.35); }
    .club-logo { width:52px; height:52px; border-radius:14px; background:linear-gradient(135deg,var(--accent),var(--purple)); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:white; margin-bottom:14px; }
    .club-name { font-size:15px; font-weight:700; color:var(--text-primary); margin-bottom:6px; }
    .club-desc { font-size:13px; color:var(--text-muted); margin-bottom:14px; line-height:1.5; }
    .club-footer { display:flex; gap:8px; justify-content:flex-end; border-top:1px solid var(--border); padding-top:14px; }
  </style>
</head>
<body class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="url(#sg)"/>
          <path d="M8 16l5 5 9-10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="sg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#4f7cf7"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
      </div>
      <span class="logo-text">IBU Connect</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="admin-dashboard.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <span class="nav-section-label">Management</span>
      <a href="manage-users.html" class="nav-item" id="navUsers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Manage Users
      </a>
      <a href="manage-clubs.html" class="nav-item" id="navClubs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Manage Clubs
      </a>
      <a href="manage-events.html" class="nav-item" id="navEvents">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Manage Events
      </a>
      <a href="assign-roles.html" class="nav-item" id="navRoles">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Assign Roles
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">AD</div>
        <div>
          <div class="user-name" id="sidebarName">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn-secondary btn-full" onclick="logout()" style="font-size:12px;padding:8px 12px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">Manage Clubs</div>
        <div class="topbar-subtitle">Create, update or delete university clubs</div>
      </div>
      <button class="btn-primary" id="openCreateClub" style="font-size:13px;padding:9px 18px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Club
      </button>
    </div>

    <div class="page-content">
      <div id="clubsGrid" class="clubs-grid">
        <div style="color:var(--text-muted);padding:40px;">Loading clubs...</div>
      </div>
    </div>
  </div>

  <!-- CREATE/EDIT CLUB MODAL -->
  <div class="modal-overlay" id="clubModal">
    <div class="modal-card" style="max-width:520px;">
      <div class="modal-title" id="clubModalTitle">Create New Club</div>
      <input type="hidden" id="editClubId">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="form-group">
          <label class="form-label">Club Name *</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <input type="text" id="clubName" class="form-input" placeholder="e.g. Computer Science Club">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="clubDesc" placeholder="Brief description of the club..." rows="3" style="width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text-primary);outline:none;resize:vertical;transition:var(--transition);"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Logo URL (optional)</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <input type="url" id="clubLogo" class="form-input" placeholder="https://...">
          </div>
        </div>
        <div id="clubAlert" class="login-alert" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeClubModal()">Cancel</button>
        <button class="btn-primary" id="saveClubBtn">
          <span id="saveClubText">Create Club</span>
          <div class="spinner" id="savingSpinner" style="display:none;"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-card" style="max-width:420px;">
      <div class="modal-title">Delete Club</div>
      <p id="deleteMsg" style="color:var(--text-secondary);font-size:14px;"></p>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-danger" id="deleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>


  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/common/api.js"></script>
  <script src="../assets/js/common/auth.js"></script>

  <script>
    let allClubs = [];

    $(document).ready(async function() {
      if (!guardAdmin()) return;
      setUserInfoSidebar();
      $('#navClubs').addClass('active');
      await loadClubs();

      $('#openCreateClub').on('click', function() {
        $('#editClubId').val('');
        $('#clubName').val('');
        $('#clubDesc').val('');
        $('#clubLogo').val('');
        $('#clubModalTitle').text('Create New Club');
        $('#saveClubText').text('Create Club');
        $('#clubAlert').hide();
        $('#clubModal').addClass('visible');
      });

      $('#saveClubBtn').on('click', saveClub);
      $('#clubModal').on('click', function(e) { if ($(e.target).is('#clubModal')) closeClubModal(); });
      $('#deleteModal').on('click', function(e) { if ($(e.target).is('#deleteModal')) closeDeleteModal(); });
    });

    async function loadClubs() {
      try {
        const data = await API.getClubs();
        allClubs = Array.isArray(data) ? data : (data.clubs || []);
        renderClubs();
      } catch(e) {
        $('#clubsGrid').html('<div style="color:var(--text-muted);padding:40px;">Could not load clubs. Is the backend running?</div>');
      }
    }

    function renderClubs() {
      if (!allClubs.length) {
        $('#clubsGrid').html('<div style="color:var(--text-muted);padding:40px;text-align:center;">No clubs yet. Create the first one!</div>');
        return;
      }
      $('#clubsGrid').html(allClubs.map((c, i) => {
        const initial = (c.name || '?').charAt(0).toUpperCase();
        const colors = ['#4f7cf7','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4'];
        const color = colors[i % colors.length];
        return '<div class="club-card" style="animation-delay:' + (i*0.05) + 's">' +
          '<div class="club-logo" style="background:' + color + '">' + initial + '</div>' +
          '<div class="club-name">' + (c.name || '—') + '</div>' +
          '<div class="club-desc">' + (c.description || 'No description provided.') + '</div>' +
          '<div class="club-footer">' +
            '<button class="btn-danger" onclick="confirmDelete(' + c.id + ','' + (c.name||'').replace(/'/g,"\'") + '')">Delete</button>' +
            '<button class="btn-secondary" style="font-size:12px;" onclick="editClub(' + c.id + ')">Edit</button>' +
          '</div>' +
        '</div>';
      }).join(''));
    }

    function editClub(id) {
      const club = allClubs.find(c => c.id === id);
      if (!club) return;
      $('#editClubId').val(id);
      $('#clubName').val(club.name || '');
      $('#clubDesc').val(club.description || '');
      $('#clubLogo').val(club.logo_url || '');
      $('#clubModalTitle').text('Edit Club');
      $('#saveClubText').text('Save Changes');
      $('#clubAlert').hide();
      $('#clubModal').addClass('visible');
    }

    async function saveClub() {
      const name = $('#clubName').val().trim();
      if (!name) { showClubAlert('Club name is required.', 'error'); return; }
      const payload = { name, description: $('#clubDesc').val().trim(), logo_url: $('#clubLogo').val().trim() };
      const editId = $('#editClubId').val();

      $('#saveClubBtn').prop('disabled', true);
      $('#saveClubText').hide(); $('#savingSpinner').show();
      try {
        if (editId) { await API.updateClub(editId, payload); }
        else { await API.createClub(payload); }
        closeClubModal();
        await loadClubs();
      } catch(e) {
        showClubAlert(e.message || 'Failed to save club.', 'error');
      } finally {
        $('#saveClubBtn').prop('disabled', false);
        $('#saveClubText').show(); $('#savingSpinner').hide();
      }
    }

    function confirmDelete(id, name) {
      $('#deleteMsg').text('Are you sure you want to delete "' + name + '"? This cannot be undone.');
      $('#deleteConfirmBtn').off('click').on('click', async function() {
        try { await API.deleteClub(id); closeDeleteModal(); await loadClubs(); }
        catch(e) { alert('Error: ' + e.message); }
      });
      $('#deleteModal').addClass('visible');
    }

    function showClubAlert(msg, type) {
      $('#clubAlert').removeClass('alert-error alert-success').addClass(type === 'error' ? 'alert-error' : 'alert-success').text(msg).show();
    }
    function closeClubModal() { $('#clubModal').removeClass('visible'); }
    function closeDeleteModal() { $('#deleteModal').removeClass('visible'); }
  </script>
</body>
</html>
