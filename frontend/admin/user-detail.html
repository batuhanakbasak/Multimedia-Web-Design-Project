<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/admin.css" />
  </head>
  <body data-page="user-detail">
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <div class="admin-shell">
      <aside class="sidebar" id="sidebar-root"></aside>

      <div class="admin-main">
        <header id="navbar-root"></header>

        <main class="page-content">
          <nav class="breadcrumb-row">
            <a href="./users.html" class="text-link">Back to users</a>
          </nav>

          <section id="user-detail-header"></section>
          <section class="metrics-row" id="user-metrics"></section>

          <section class="content-grid detail-columns">
            <article class="panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Profile</p>
                  <h3>Core account information</h3>
                </div>
              </div>
              <div id="user-profile-card"></div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Memberships</p>
                  <h3>Club involvement</h3>
                </div>
              </div>
              <div id="user-memberships"></div>
            </article>
          </section>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root"></div>

    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"></script>
    <script src="../assets/js/jquery-extras.js"></script>
    <script src="./js/runtime-config.js"></script>
    <script type="module" src="./js/users.js"></script>
  </body>
</html>
