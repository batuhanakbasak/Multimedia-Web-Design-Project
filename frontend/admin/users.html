<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/admin.css" />
  </head>
  <body data-page="users">
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <div class="admin-shell">
      <aside class="sidebar" id="sidebar-root"></aside>

      <div class="admin-main">
        <header id="navbar-root"></header>

        <main class="page-content">
          <section class="page-banner">
            <div>
              <p class="eyebrow">Users</p>
              <h3>Search, filter, and control system accounts</h3>
              <p class="section-copy">
                Review account states, inspect roles, and lock access immediately when needed.
              </p>
            </div>
            <button type="button" class="button button-secondary" id="users-refresh">Refresh</button>
          </section>

          <section class="panel">
            <form class="toolbar-grid" id="users-filters">
              <label>
                <span>Search</span>
                <input type="search" name="search" placeholder="Name or email" />
              </label>
              <label>
                <span>Role</span>
                <select name="role">
                  <option value="">All roles</option>
                  <option value="student">Student</option>
                  <option value="organizer">Organizer</option>
                  <option value="admin">Admin</option>
                </select>
              </label>
              <label>
                <span>Status</span>
                <select name="is_active">
                  <option value="">All statuses</option>
                  <option value="true">Active</option>
                  <option value="false">Inactive</option>
                </select>
              </label>
              <div class="toolbar-actions">
                <button type="submit" class="button button-primary">Apply</button>
                <button type="reset" class="button button-ghost">Reset</button>
              </div>
            </form>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Last Login</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="users-table-body"></tbody>
              </table>
            </div>

            <div class="panel-foot">
              <p id="users-summary">Loading users...</p>
              <div id="users-pagination" class="pagination-row"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root"></div>

    <script src="./js/runtime-config.js"></script>
    <script type="module" src="./js/users.js"></script>
  </body>
</html>
