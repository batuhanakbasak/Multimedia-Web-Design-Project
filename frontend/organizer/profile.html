<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../admin/css/admin.css" />
  <style>
      .profile-card { background: rgba(255,255,255,0.8); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; max-width: 500px; margin: 0 auto; }
      .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--teal); color: white; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: bold; }
      .profile-info { text-align: center; }
      .profile-name { font-size: 24px; font-family: 'Space Grotesk', sans-serif; margin-bottom: 0.5rem; }
      .profile-role { color: var(--teal-deep); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
  </style>
</head>
<body data-page="profile">
  <div class="admin-shell">
    <aside class="sidebar" id="sidebar-root"></aside>

    <div class="admin-main">
      <header id="navbar-root"></header>

      <main class="page-content">
        <section class="page-banner">
          <div>
            <p class="eyebrow">Settings</p>
            <h3>Organizer Profile</h3>
          </div>
        </section>

        <section class="content-grid">
           <article class="profile-card" style="grid-column: 1/-1;">
               <div id="avatar" class="profile-avatar">O</div>
               <div class="profile-info">
                   <div id="name" class="profile-name">Organizer Name</div>
                   <div id="email" style="color: var(--ink-soft); margin-bottom:1rem;">email@ibu.edu.ba</div>
                   <div class="profile-role">Event Organizer</div>
               </div>
           </article>
        </section>
      </main>
    </div>
  </div>

  <script src="./js/runtime-config.js"></script>
  <script type="module">
    import { requireAuth, renderSidebar, renderNavbar, escapeHtml } from './js/app.js';

    document.addEventListener('DOMContentLoaded', () => {
      const profile = requireAuth();
      renderSidebar('profile');
      renderNavbar('My Profile');

      if (profile) {
          document.getElementById('name').textContent = escapeHtml(profile.full_name || 'Organizer');
          document.getElementById('email').textContent = escapeHtml(profile.email || '');
          if (profile.full_name) {
             document.getElementById('avatar').textContent = profile.full_name.substring(0, 2).toUpperCase();
          }
      }
    });
  </script>
</body>
</html>
