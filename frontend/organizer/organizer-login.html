<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBU Connect | Organizer Login</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    .role-badge { display:inline-block; font-size:10px; font-weight:700; padding:4px 8px; border-radius:4px; letter-spacing:1px; text-transform:uppercase; background:rgba(245,158,11,0.1); color:#f59e0b; border:1px solid rgba(245,158,11,0.2); margin-left:12px; vertical-align:middle; }
    .header-group { display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
  </style>
</head>
<body class="login-centered">
  <div class="login-card">
    <div class="header-group">
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <h2 style="font-size:20px;font-weight:700;margin-left:10px;">IBU Connect</h2>
      <span class="role-badge">Organizer</span>
    </div>

    <h3 style="text-align:center;font-size:16px;color:var(--text-secondary);margin-bottom:32px;font-weight:400;">Sign in to manage your events</h3>

    <div id="loginAlert" class="login-alert alert-error">Invalid credentials</div>

    <form id="organizerLoginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" class="form-input" required placeholder="organizer@ibu.edu.ba">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" class="form-input" required placeholder="Enter password">
        </div>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;margin-top:16px;padding:12px;">
        Sign In as Organizer
      </button>
    </form>
    
    <div style="text-align:center;margin-top:24px;color:var(--text-muted);font-size:13px;">
      Not an organizer? <a href="#" style="color:var(--accent);text-decoration:none;">Student Login</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/common/api.js"></script>
  <script src="../assets/js/common/auth.js"></script>
  
  <script>
    if (Auth.isLoggedIn() && Auth.hasRole('organizer')) {
      window.location.href = 'organizer-dashboard.html';
    }

    $('#organizerLoginForm').on('submit', async function(e) {
      e.preventDefault();
      const email = $('#email').val();
      const password = $('#password').val();
      const $alert = $('#loginAlert');
      const $btn = $('#loginBtn');

      $alert.hide();
      $btn.text('Signing in...').prop('disabled', true);

      try {
        const response = await API.loginOrganizer(email, password);
        // Assuming response structure contains token and user object
        if (response.token) {
          Auth.setToken(response.token);
          Auth.setUser(response.user || { email, role: 'organizer' });
          window.location.href = 'organizer-dashboard.html';
        } else {
          throw new Error('No token returned');
        }
      } catch (err) {
        $alert.text(err.message || 'Login failed').show();
      } finally {
        $btn.text('Sign In as Organizer').prop('disabled', false);
      }
    });
  </script>
</body>
</html>
