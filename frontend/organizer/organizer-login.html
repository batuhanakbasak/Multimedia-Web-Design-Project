<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Login | IBU Connect</title>
  <script>
    (function () {
      if (window.location.protocol === 'file:') {
        window.location.replace('http://localhost:5500/organizer/organizer-login.html');
      }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body data-page="login">
  <main class="auth-shell">
    <section class="auth-showcase">
      <div class="auth-brand">
        <p class="eyebrow">IBU Connect Platform</p>
        <h1>Manage your engaging events.</h1>
      </div>
    </section>

    <section class="auth-card">
      <div class="auth-card-head">
        <p class="eyebrow">Organizer Sign In</p>
        <h2>Welcome back</h2>
      </div>

      <div class="auth-message" data-login-message role="status" aria-live="polite" hidden></div>

      <form class="auth-form" data-login-form>
        <label><span>Email</span><input type="email" name="email" required /></label>
        <label><span>Password</span><input type="password" name="password" required /></label>
        <button type="submit" class="auth-submit">Sign In as Organizer</button>
      </form>
    </section>
  </main>
  <script src="./js/runtime-config.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
