<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../admin/css/admin.css" />
</head>
<body data-page="dashboard">
  <div class="admin-shell">
    <aside class="sidebar" id="sidebar-root"></aside>

    <div class="admin-main">
      <header id="navbar-root"></header>

      <main class="page-content">
        <section class="page-banner">
          <div>
            <p class="eyebrow">Overview</p>
            <p class="section-copy">Welcome back. Here is your event performance and upcoming schedule.</p>
          </div>
          <div style="margin-top: 1rem;">
             <a href="create-event.html" class="button" style="background:var(--text-main);color:white;text-decoration:none;padding:10px 20px;border-radius:12px;">+ Create New Event</a>
          </div>
        </section>

        <!-- Stats Grid From Guide -->
        <section class="stats-grid">
           <div class="stat-card">
              <p>Total Events</p>
              <strong id="stat-total">0</strong>
           </div>
           <div class="stat-card accent-teal">
              <p>Active</p>
              <strong id="stat-active">0</strong>
           </div>
           <div class="stat-card accent-rose">
              <p>Cancelled</p>
              <strong id="stat-cancelled">0</strong>
           </div>
           <div class="stat-card accent-gold">
              <p>Participants</p>
              <strong id="stat-participants">0</strong>
           </div>
        </section>

        <section class="content-grid">
          <article class="panel" style="grid-column: 1 / -1;">
            <div class="panel-head">
              <div>
                <p class="eyebrow">All Events</p>
                <h3>Your Schedule</h3>
              </div>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Event Title</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Quota</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="events-body">
                   <tr><td colspan="6"><div class="empty-inline">Loading events...</div></td></tr>
                </tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>

  <script src="./js/runtime-config.js"></script>
  <script type="module">
    import { requireAuth, renderSidebar, renderNavbar, escapeHtml, formatDate } from './js/app.js';
    import { apiRequest } from './js/api.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const profile = requireAuth();
      renderSidebar('dashboard');
      renderNavbar('Organizer Dashboard');

      try {
        const [dashboardRes, eventsRes] = await Promise.all([
          apiRequest('/organizer/dashboard'),
          apiRequest('/organizer/events')
        ]);
        const stats = dashboardRes.data || dashboardRes || {};
        let events = eventsRes.data || eventsRes || [];
        if (!Array.isArray(events)) {
          events = stats.upcoming_events || stats.events || [];
        }
        
        // Update Stats
        document.getElementById('stat-total').textContent = stats.total_events || 0;
        document.getElementById('stat-active').textContent = stats.active_events || 0;
        document.getElementById('stat-cancelled').textContent = stats.cancelled_events || 0;
        document.getElementById('stat-participants').textContent = stats.total_participants || 0;

        const tbody = document.getElementById('events-body');
        if (!events || events.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-inline">You haven't created any events yet.</div></td></tr>`;
            return;
        }

        tbody.innerHTML = events.map(ev => `
          <tr>
            <td><strong>${escapeHtml(ev.title)}</strong></td>
            <td>${formatDate(ev.event_date)}</td>
            <td>${escapeHtml(ev.location)}</td>
            <td>${ev.quota || 0}</td>
            <td><span class="badge status-${(ev.status||'').toLowerCase()}">${escapeHtml(ev.status)}</span></td>
            <td>
                <a href="participants.html?id=${ev.id}" class="button button-small" style="background:transparent;border:1px solid var(--text-main);color:var(--text-main); margin-right: 5px;">Participants</a>
                ${ev.status !== 'cancelled' ? `<button class="button button-small cancel-btn" data-id="${ev.id}" style="background:transparent;border:1px solid #bb4f4f;color:#bb4f4f;">Cancel</button>` : ''}
            </td>
          </tr>
        `).join('');
      
        // Attach listeners to cancel buttons
        document.querySelectorAll('.cancel-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const evId = e.target.getAttribute('data-id');
                if(confirm("Are you sure you want to cancel this event?")) {
                     try {
                         await apiRequest(`/organizer/events/${evId}`, { method: 'DELETE' });
                         window.location.reload();
                     } catch(err) {
                         alert(err.message);
                     }
                }
            });
        });
      } catch (err) {
         document.getElementById('events-body').innerHTML = `<tr><td colspan="5"><div class="empty-inline error" style="color:red;">Error loading events: ${escapeHtml(err.message)}</div></td></tr>`;
      }
    });
  </script>
</body>
</html>
