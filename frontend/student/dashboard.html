<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard | IBU Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../admin/css/admin.css" />
  <style>
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .event-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: transform 0.2s; display: flex; flex-direction: column; }
    .event-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    .event-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
    .event-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .event-cat { font-size: 12px; text-transform: uppercase; color: var(--text-soft); font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 1px;}
    .event-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-main); line-height: 1.3;}
    .event-meta { font-size: 14px; color: var(--text-soft); display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem;}
    .event-meta span { display: flex; align-items: center; gap: 0.5rem; }
  </style>
</head>
<body data-page="dashboard">
  <div class="admin-shell">
    <aside class="sidebar" id="sidebar-root"></aside>
    <div class="admin-main">
      <header id="navbar-root"></header>
      <main class="page-content">
        <section class="page-banner">
          <div>
            <p class="eyebrow">Discover</p>
            <h3>Explore Campus Events</h3>
            <p class="section-copy">Find workshops, seminars, and social activities happening around IBU.</p>
          </div>
        </section>

        <!-- Search & Filter -->
        <section class="panel">
           <form id="filterForm" class="toolbar-grid">
               <label>
                 <span>Search</span>
                 <input type="text" name="search" placeholder="Event title..." />
               </label>
               <label>
                 <span>Category</span>
                 <select name="category">
                   <option value="">All Categories</option>
                   <option value="Workshop">Workshop</option>
                   <option value="Seminar">Seminar</option>
                   <option value="Social">Social</option>
                   <option value="Academic">Academic</option>
                 </select>
               </label>
               <div class="toolbar-actions">
                  <button type="submit" class="button" style="background:var(--text-main);color:white;">Search</button>
               </div>
           </form>
        </section>

        <section id="events-list" class="event-grid">
           <!-- Events will be loaded here -->
           <div class="empty-state">Loading amazing events for you...</div>
        </section>
      </main>
    </div>
  </div>

  <script src="./js/runtime-config.js"></script>
  <script type="module">
    import { requireAuth, renderSidebar, renderNavbar, escapeHtml, formatDate } from './js/app.js';
    import { apiRequest } from './js/api.js';

    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      renderSidebar('dashboard');
      renderNavbar('Explore Events');

      const loadEvents = async (filters = {}) => {
        const list = document.getElementById('events-list');
        list.innerHTML = '<div class="empty-state">Loading...</div>';

        try {
          const query = new URLSearchParams(filters).toString();
          const response = await apiRequest(`/student/events?${query}`);
          const events = response.data || [];

          if (events.length === 0) {
            list.innerHTML = '<div class="empty-state">No events found matching your criteria.</div>';
            return;
          }

          list.innerHTML = events.map(ev => `
            <article class="event-card">
              <img src="${ev.image_url || 'https://via.placeholder.com/400x200?text=IBU+Event'}" class="event-img" alt="Event Image">
              <div class="event-body">
                <div class="event-cat">${escapeHtml(ev.category)}</div>
                <h4 class="event-title">${escapeHtml(ev.title)}</h4>
                <div class="event-meta">
                  <span>📅 ${formatDate(ev.event_date)}</span>
                  <span>📍 ${escapeHtml(ev.location)}</span>
                  <span>🛡️ ${escapeHtml(ev.club?.name || 'IBU Connect')}</span>
                </div>
                <div style="margin-top:auto;">
                  <a href="event-detail.html?id=${ev.id}" class="button button-block" style="background:transparent; border:1px solid var(--text-main); color:var(--text-main);">View Details</a>
                </div>
              </div>
            </article>
          `).join('');

        } catch (err) {
          list.innerHTML = `<div class="empty-state error" style="color:red;">Error loading events: ${escapeHtml(err.message)}</div>`;
        }
      };

      loadEvents();

      document.getElementById('filterForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        loadEvents({
          keyword: formData.get('search'),
          category: formData.get('category')
        });
      });
    });
  </script>
</body>
</html>
