<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Events | IBU Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/student.css" />
  </head>
  <body class="student-portal">
    <div class="student-shell">
      <aside class="student-sidebar" data-student-sidebar></aside>

      <div class="student-main">
        <header class="student-topbar" data-student-topbar></header>

        <main class="student-content">
          <section class="student-hero">
            <div class="student-hero__content">
              <p class="eyebrow">Participation</p>
              <h1>Everything you have joined so far.</h1>
              <p>
                Review your upcoming schedule, open any event detail page, or leave an event
                directly from this list.
              </p>
            </div>

            <div class="student-hero__actions">
              <a class="button" href="./events.html">Browse more events</a>
            </div>
          </section>

          <section data-my-events-grid></section>
          <section data-my-events-pagination></section>
        </main>
      </div>
    </div>

    <script src="./js/runtime-config.js"></script>
    <script type="module" src="../assets/js/student/my-events.js"></script>
  </body>
</html>
