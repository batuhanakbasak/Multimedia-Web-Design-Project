<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events | IBU Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/student.css" />
  </head>
  <body class="student-portal">
    <div class="student-shell">
      <aside class="student-sidebar" data-student-sidebar></aside>

      <div class="student-main">
        <header class="student-topbar" data-student-topbar></header>

        <main class="student-content">
          <section class="student-hero">
            <div class="student-hero__content">
              <p class="eyebrow">Events feed</p>
              <h1>Browse the latest campus events.</h1>
              <p>
                Search by keyword, filter by category or date, and sort upcoming events the way you
                prefer.
              </p>
            </div>
          </section>

          <section class="filters-panel">
            <div class="student-panel__head">
              <div>
                <p class="eyebrow">Filters</p>
                <h2>Find the right event</h2>
              </div>
              <strong data-events-summary>Loading events...</strong>
            </div>

            <form class="stack-grid" data-events-form>
              <div class="filters-grid">
                <label>
                  <span>Search</span>
                  <input type="text" name="search" placeholder="robotics, seminar, workshop..." />
                </label>

                <label>
                  <span>Category</span>
                  <input type="text" name="category" placeholder="Technology" />
                </label>

                <label>
                  <span>Date</span>
                  <input type="date" name="date" />
                </label>

                <label>
                  <span>Sort</span>
                  <select name="sort">
                    <option value="upcoming">Upcoming</option>
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                  </select>
                </label>

                <label>
                  <span>Cards per page</span>
                  <select name="limit">
                    <option value="6">6</option>
                    <option value="9" selected>9</option>
                    <option value="12">12</option>
                  </select>
                </label>
              </div>

              <div class="filters-actions">
                <button type="submit" class="button">Apply filters</button>
                <button type="reset" class="button-secondary">Reset</button>
              </div>
            </form>
          </section>

          <section class="card-grid" data-events-grid></section>
          <section data-events-pagination></section>
        </main>
      </div>
    </div>

    <script src="./js/runtime-config.js"></script>
    <script type="module" src="../assets/js/student/events.js"></script>
  </body>
</html>
